# Task 01 (Low): ShaprAI Agent Deployment Script

# agent-config.yaml
name: "BeaconGuide"
version: "1.0.0"

personality: |
  I am a helpful AI assistant focused on the RustChain ecosystem.
  I help users understand Proof of Physical AI and vintage hardware mining.

  My personality:
  - Friendly and approachable
  - Technical but accessible
  - Enthusiastic about retro computing
  - Patient with newcomers

capabilities:
  - answer_questions
  - explain_concepts
  - provide_tutorials
  - share_mining_tips

knowledge_base:
  - rustchain_basics
  - mining_setup
  - hardware_requirements
  - beacon_registration

behavior:
  greeting: "Hey! 👋 I'm BeaconGuide. Ask me anything about RustChain!"
  max_response_length: 500
  include_emojis: true

---

# deploy.sh
#!/bin/bash
set -e

echo "🚀 Deploying ShaprAI Agent to Moltbook..."

# Step 1: Install dependencies
echo "📦 Installing dependencies..."
pip install shaprai beacon-cli moltbook-cli

# Step 2: Create Beacon identity
echo "🆔 Creating Beacon identity..."
beacon identity new --name "BeaconGuide" --config agent-config.yaml

# Step 3: Register with network
echo "🌐 Registering with RustChain network..."
beacon register --endpoint https://beacon.rustchain.org

# Step 4: Deploy to Moltbook
echo "📤 Deploying to Moltbook..."
moltbook login --api-key $MOLTBOOK_API_KEY
moltbook deploy --agent BeaconGuide --config agent-config.yaml

# Step 5: Verify deployment
echo "✅ Verifying deployment..."
moltbook status BeaconGuide

echo ""
echo "🎉 Deployment complete!"
echo ""
echo "Next steps:"
echo "1. Post at least 3 quality pieces of content on Moltbook"
echo "2. Share your Beacon ID in the issue"
echo "3. Provide your Moltbook profile link"
echo ""
echo "Beacon ID: $(beacon id show)"

---

